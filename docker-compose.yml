version: "3.8"

services:
  neo4j:
    image: neo4j:5.20-community
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: "neo4j/assessment123"
    volumes:
      - neo4j_data:/data
      - neo4j_import:/import
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_import:
